<svg viewBox="0 0 1600 700" xmlns="http://www.w3.org/2000/svg" font-family="Arial, 'Helvetica Neue', sans-serif">
  <rect width="1600" height="700" rx="28" fill="#f6f9fc"/>
  <text x="800" y="92" text-anchor="middle" font-size="24" font-weight="bold" fill="#75849a" letter-spacing="4">AI LÀM ĐƯỢC GÌ, CON NGƯỜI GIỮ GÌ?</text>
  <rect x="740" y="112" width="120" height="7" rx="3.5" fill="#F2C13D"/>

  <!-- AI column -->
  <rect x="130" y="170" width="620" height="450" rx="26" fill="#ffffff" stroke="#e9ecf2" stroke-width="3"/>
  <rect x="130" y="170" width="620" height="96" rx="26" fill="#2e86c9"/>
  <rect x="130" y="230" width="620" height="36" fill="#2e86c9"/>
  <text x="440" y="230" text-anchor="middle" font-size="30" font-weight="bold" fill="#fff">AI làm rất tốt</text>
  <g font-size="23" fill="#3d4c60">
    <circle cx="185" cy="320" r="6" fill="#2e86c9"/><text x="210" y="328">Viết code theo yêu cầu rõ ràng</text>
    <circle cx="185" cy="388" r="6" fill="#2e86c9"/><text x="210" y="396">Sửa lỗi cú pháp, giải thích code</text>
    <circle cx="185" cy="456" r="6" fill="#2e86c9"/><text x="210" y="464">Làm nhanh việc lặp lại</text>
    <circle cx="185" cy="524" r="6" fill="#2e86c9"/><text x="210" y="532">Gợi ý nhiều cách giải khác nhau</text>
  </g>

  <!-- human column -->
  <rect x="850" y="170" width="620" height="450" rx="26" fill="#ffffff" stroke="#d9ebde" stroke-width="3"/>
  <rect x="850" y="170" width="620" height="96" rx="26" fill="#1f8b3f"/>
  <rect x="850" y="230" width="620" height="36" fill="#1f8b3f"/>
  <text x="1160" y="230" text-anchor="middle" font-size="30" font-weight="bold" fill="#fff">Vẫn cần con người</text>
  <g font-size="23" fill="#3d4c60">
    <circle cx="905" cy="320" r="6" fill="#1f8b3f"/><text x="930" y="328">Biết mình muốn làm ra cái gì, cho ai</text>
    <circle cx="905" cy="388" r="6" fill="#1f8b3f"/><text x="930" y="396">Chia vấn đề lớn thành các bước nhỏ</text>
    <circle cx="905" cy="456" r="6" fill="#1f8b3f"/><text x="930" y="464">Đánh giá code AI viết đúng hay sai</text>
    <circle cx="905" cy="524" r="6" fill="#1f8b3f"/><text x="930" y="532">Chịu trách nhiệm về sản phẩm cuối</text>
  </g>
</svg>
