<svg viewBox="0 0 1600 720" xmlns="http://www.w3.org/2000/svg" font-family="Arial, 'Helvetica Neue', sans-serif">
  <rect width="1600" height="720" rx="28" fill="#f6f9fc"/>
  <text x="800" y="92" text-anchor="middle" font-size="24" font-weight="bold" fill="#75849a" letter-spacing="4">HIỂU LẦM VÀ SỰ THẬT</text>
  <rect x="740" y="112" width="120" height="7" rx="3.5" fill="#F2C13D"/>

  <g font-size="22">
    <!-- row 1 -->
    <rect x="120" y="170" width="640" height="140" rx="24" fill="#ffffff" stroke="#e9ecf2" stroke-width="3"/>
    <circle cx="185" cy="240" r="26" fill="#fdecea"/>
    <path d="M 172 227 l 26 26 M 198 227 l -26 26" stroke="#e0655f" stroke-width="7" stroke-linecap="round"/>
    <text x="240" y="228" fill="#75849a">"Học lập trình là để</text>
    <text x="240" y="262" fill="#75849a">thành lập trình viên"</text>
    <rect x="840" y="170" width="640" height="140" rx="24" fill="#ffffff" stroke="#d9ebde" stroke-width="3"/>
    <circle cx="905" cy="240" r="26" fill="#e6f4ea"/>
    <path d="M 892 240 l 10 11 l 20 -24" stroke="#1f8b3f" stroke-width="7" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="960" y="228" fill="#3d4c60">Học để rèn tư duy, như học</text>
    <text x="960" y="262" fill="#3d4c60">toán không phải để làm nhà toán học</text>

    <!-- row 2 -->
    <rect x="120" y="340" width="640" height="140" rx="24" fill="#ffffff" stroke="#e9ecf2" stroke-width="3"/>
    <circle cx="185" cy="410" r="26" fill="#fdecea"/>
    <path d="M 172 397 l 26 26 M 198 397 l -26 26" stroke="#e0655f" stroke-width="7" stroke-linecap="round"/>
    <text x="240" y="398" fill="#75849a">"Phải giỏi toán</text>
    <text x="240" y="432" fill="#75849a">mới học được"</text>
    <rect x="840" y="340" width="640" height="140" rx="24" fill="#ffffff" stroke="#d9ebde" stroke-width="3"/>
    <circle cx="905" cy="410" r="26" fill="#e6f4ea"/>
    <path d="M 892 410 l 10 11 l 20 -24" stroke="#1f8b3f" stroke-width="7" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="960" y="398" fill="#3d4c60">Giai đoạn đầu chỉ cần biết đếm</text>
    <text x="960" y="432" fill="#3d4c60">và so sánh; chính lập trình bồi lại toán</text>

    <!-- row 3 -->
    <rect x="120" y="510" width="640" height="140" rx="24" fill="#ffffff" stroke="#e9ecf2" stroke-width="3"/>
    <circle cx="185" cy="580" r="26" fill="#fdecea"/>
    <path d="M 172 567 l 26 26 M 198 567 l -26 26" stroke="#e0655f" stroke-width="7" stroke-linecap="round"/>
    <text x="240" y="568" fill="#75849a">"Học sớm là thêm</text>
    <text x="240" y="602" fill="#75849a">giờ dán mắt vào màn hình"</text>
    <rect x="840" y="510" width="640" height="140" rx="24" fill="#ffffff" stroke="#d9ebde" stroke-width="3"/>
    <circle cx="905" cy="580" r="26" fill="#e6f4ea"/>
    <path d="M 892 580 l 10 11 l 20 -24" stroke="#1f8b3f" stroke-width="7" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="960" y="568" fill="#3d4c60">Khác về chất: giờ sáng tạo chủ động</text>
    <text x="960" y="602" fill="#3d4c60">thay thế giờ xem thụ động</text>
  </g>
</svg>
