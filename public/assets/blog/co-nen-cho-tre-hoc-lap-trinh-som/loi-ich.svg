<svg viewBox="0 0 1600 700" xmlns="http://www.w3.org/2000/svg" font-family="Arial, 'Helvetica Neue', sans-serif">
  <rect width="1600" height="700" rx="28" fill="#f4faf6"/>
  <text x="800" y="96" text-anchor="middle" font-size="24" font-weight="bold" fill="#75849a" letter-spacing="4">TRẺ HỌC LẬP TRÌNH SỚM ĐƯỢC GÌ?</text>
  <rect x="740" y="116" width="120" height="7" rx="3.5" fill="#F2C13D"/>

  <g text-anchor="middle">
    <rect x="115" y="180" width="310" height="330" rx="26" fill="#ffffff" stroke="#e9ecf2" stroke-width="3"/>
    <rect x="225" y="220" width="90" height="90" rx="22" fill="#1f8b3f"/>
    <path d="M 250 265 h 40 M 270 245 v 40" stroke="#fff" stroke-width="9" stroke-linecap="round"/>
    <text x="270" y="370" font-size="24" font-weight="bold" fill="#1E3A63">Tư duy có</text>
    <text x="270" y="402" font-size="24" font-weight="bold" fill="#1E3A63">trình tự</text>
    <text x="270" y="444" font-size="18" fill="#75849a">chia việc lớn thành</text>
    <text x="270" y="470" font-size="18" fill="#75849a">các bước nhỏ</text>

    <rect x="465" y="180" width="310" height="330" rx="26" fill="#ffffff" stroke="#e9ecf2" stroke-width="3"/>
    <rect x="575" y="220" width="90" height="90" rx="22" fill="#2e86c9"/>
    <path d="M 598 275 q 22 -40 44 0 q -22 18 -44 0 z" fill="#fff"/>
    <circle cx="620" cy="248" r="9" fill="#fff"/>
    <text x="620" y="370" font-size="24" font-weight="bold" fill="#1E3A63">Bình tĩnh</text>
    <text x="620" y="402" font-size="24" font-weight="bold" fill="#1E3A63">với lỗi sai</text>
    <text x="620" y="444" font-size="18" fill="#75849a">sai, thử lại, sửa được:</text>
    <text x="620" y="470" font-size="18" fill="#75849a">chuyện bình thường</text>

    <rect x="815" y="180" width="310" height="330" rx="26" fill="#ffffff" stroke="#e9ecf2" stroke-width="3"/>
    <rect x="925" y="220" width="90" height="90" rx="22" fill="#F2C13D"/>
    <path d="M 970 240 l 9 20 l 22 3 l -16 16 l 4 22 l -19 -11 l -19 11 l 4 -22 l -16 -16 l 22 -3 z" fill="#1E3A63"/>
    <text x="970" y="370" font-size="24" font-weight="bold" fill="#1E3A63">Sáng tạo</text>
    <text x="970" y="402" font-size="24" font-weight="bold" fill="#1E3A63">có sản phẩm</text>
    <text x="970" y="444" font-size="18" fill="#75849a">ý tưởng thành trò chơi,</text>
    <text x="970" y="470" font-size="18" fill="#75849a">câu chuyện thật</text>

    <rect x="1165" y="180" width="310" height="330" rx="26" fill="#ffffff" stroke="#e9ecf2" stroke-width="3"/>
    <rect x="1275" y="220" width="90" height="90" rx="22" fill="#1E3A63"/>
    <path d="M 1298 285 v -25 M 1320 285 v -42 M 1342 285 v -14" stroke="#fff" stroke-width="10" stroke-linecap="round"/>
    <text x="1320" y="370" font-size="24" font-weight="bold" fill="#1E3A63">Tự tin dùng</text>
    <text x="1320" y="402" font-size="24" font-weight="bold" fill="#1E3A63">công nghệ</text>
    <text x="1320" y="444" font-size="18" fill="#75849a">làm chủ thiết bị thay vì</text>
    <text x="1320" y="470" font-size="18" fill="#75849a">chỉ tiêu thụ nội dung</text>
  </g>
  <text x="800" y="608" text-anchor="middle" font-size="22" fill="#75849a">Bốn lợi ích này đi theo trẻ cả đời, dù sau này con có chọn nghề công nghệ hay không.</text>
</svg>
