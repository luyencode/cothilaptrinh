  <!-- small stars -->
  <circle cx="120" cy="140" r="6" fill="#F2C13D"/>
  <circle cx="1500" cy="540" r="6" fill="#62b4ec"/>
  <circle cx="1460" cy="120" r="5" fill="#1f8b3f"/>
