  <text x="90" y="278" font-size="34" font-weight="bold" fill="#1E3A63">thực tế</text>
  <rect x="92" y="306" width="90" height="7" rx="3.5" fill="#F2C13D"/>
  <text x="90" y="360" font-size="22" fill="#5b6b82">Python, web, dữ liệu, tự động hóa:</text>
  <text x="90" y="392" font-size="22" fill="#5b6b82">code bắt đầu chạm vào đời thật.</text>

  <!-- laptop -->
  <g>
    <rect x="680" y="130" width="560" height="360" rx="24" fill="#13294a"/>
    <rect x="700" y="150" width="520" height="320" rx="14" fill="#1E3A63"/>
    <path d="M 620 490 h 680 l 40 60 q 6 14 -12 14 h -736 q -18 0 -12 -14 z" fill="#c9d5e4"/>
    <g font-family="DejaVu Sans Mono, Consolas, monospace" font-size="23">
      <text x="730" y="205" fill="#62b4ec">import <tspan fill="#e7eefb">pandas</tspan></text>
      <text x="730" y="250" fill="#57c07d"># phân tích điểm cả lớp</text>
      <text x="730" y="295" fill="#e7eefb">diem = doc_file(<tspan fill="#F2C13D">"lop9A.csv"</tspan>)</text>
      <text x="730" y="340" fill="#e7eefb">ve_bieu_do(diem)</text>
      <text x="730" y="385" fill="#62b4ec">print<tspan fill="#e7eefb">(</tspan><tspan fill="#F2C13D">"Xong!"</tspan><tspan fill="#e7eefb">)</tspan></text>
      <rect x="730" y="405" width="16" height="30" fill="#F2C13D"/>
    </g>
  </g>

  <!-- orbiting ideas: web / AI / game -->
  <g text-anchor="middle" font-size="21" font-weight="bold">
    <circle cx="1340" cy="150" r="56" fill="#1f8b3f"/>
