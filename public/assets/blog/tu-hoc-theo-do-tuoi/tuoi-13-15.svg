    <text x="1360" y="513" fill="#1E3A63">Game</text>
    <text x="1360" y="540" fill="#8a6d1c" font-size="17" font-weight="normal">mini</text>
    <path d="M 1288 185 Q 1240 240 1268 300 M 1425 388 Q 1410 440 1400 468" stroke="#b9c8da" stroke-width="4" stroke-dasharray="2 10" stroke-linecap="round" fill="none"/>
