<svg viewBox="0 0 1600 680" xmlns="http://www.w3.org/2000/svg" font-family="Arial, 'Helvetica Neue', sans-serif">
  <rect width="1600" height="680" rx="28" fill="#f2f5fa"/>
  <rect x="1420" y="480" width="240" height="240" rx="52" fill="none" stroke="#dbe4f0" stroke-width="4"/>

  <!-- age badge -->
  <rect x="90" y="90" width="220" height="76" rx="20" fill="#1E3A63"/>
