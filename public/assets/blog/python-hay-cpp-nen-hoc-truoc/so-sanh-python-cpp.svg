<svg viewBox="0 0 1600 760" xmlns="http://www.w3.org/2000/svg" font-family="Arial, 'Helvetica Neue', sans-serif">
  <rect width="1600" height="760" rx="28" fill="#f6f9fc"/>
  <text x="800" y="92" text-anchor="middle" font-size="24" font-weight="bold" fill="#75849a" letter-spacing="4">CHỌN THEO MỤC TIÊU CỦA BẠN</text>
  <rect x="740" y="112" width="120" height="7" rx="3.5" fill="#F2C13D"/>

  <!-- Python column -->
  <rect x="130" y="170" width="620" height="480" rx="26" fill="#ffffff" stroke="#e9ecf2" stroke-width="3"/>
  <rect x="130" y="170" width="620" height="96" rx="26" fill="#1f8b3f"/>
  <rect x="130" y="230" width="620" height="36" fill="#1f8b3f"/>
  <text x="440" y="230" text-anchor="middle" font-size="34" font-weight="bold" fill="#fff">Python</text>
  <g font-size="23" fill="#3d4c60">
    <circle cx="185" cy="316" r="6" fill="#1f8b3f"/><text x="210" y="324">Cú pháp gần tiếng Anh, dễ bắt đầu</text>
    <circle cx="185" cy="380" r="6" fill="#1f8b3f"/><text x="210" y="388">Thấy kết quả nhanh, ít nản</text>
    <circle cx="185" cy="444" r="6" fill="#1f8b3f"/><text x="210" y="452">Mạnh cho web, dữ liệu, AI, tự động hóa</text>
    <circle cx="185" cy="508" r="6" fill="#1f8b3f"/><text x="210" y="516">Hợp làm dự án, sản phẩm thực tế</text>
  </g>
  <text x="440" y="600" text-anchor="middle" font-size="21" font-weight="bold" fill="#1f8b3f">Hợp với: người mới, hướng sản phẩm</text>

  <!-- C++ column -->
  <rect x="850" y="170" width="620" height="480" rx="26" fill="#ffffff" stroke="#e9ecf2" stroke-width="3"/>
  <rect x="850" y="170" width="620" height="96" rx="26" fill="#2e86c9"/>
  <rect x="850" y="230" width="620" height="36" fill="#2e86c9"/>
  <text x="1160" y="230" text-anchor="middle" font-size="34" font-weight="bold" fill="#fff">C/C++</text>
  <g font-size="23" fill="#3d4c60">
    <circle cx="905" cy="316" r="6" fill="#2e86c9"/><text x="930" y="324">Chuẩn mực trong thi HSG, Olympic, ICPC</text>
    <circle cx="905" cy="380" r="6" fill="#2e86c9"/><text x="930" y="388">Tốc độ thực thi nhanh, sát máy</text>
    <circle cx="905" cy="444" r="6" fill="#2e86c9"/><text x="930" y="452">Rèn hiểu sâu bộ nhớ, cấu trúc dữ liệu</text>
    <circle cx="905" cy="508" r="6" fill="#2e86c9"/><text x="930" y="516">Nền tảng vững cho giải thuật nâng cao</text>
  </g>
  <text x="1160" y="600" text-anchor="middle" font-size="21" font-weight="bold" fill="#2e86c9">Hợp với: thi đấu, chuyên Tin, giải thuật</text>

  <text x="800" y="716" text-anchor="middle" font-size="22" fill="#75849a">Không có ngôn ngữ vô dụng, chỉ có lựa chọn hợp mục tiêu hơn.</text>
</svg>
