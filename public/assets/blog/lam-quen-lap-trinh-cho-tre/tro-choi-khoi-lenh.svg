<svg viewBox="0 0 1600 620" xmlns="http://www.w3.org/2000/svg" font-family="Arial, 'Helvetica Neue', sans-serif">
  <rect width="1600" height="620" rx="28" fill="#f4faf6"/>
  <rect x="-70" y="-70" width="240" height="240" rx="52" fill="none" stroke="#dcefe3" stroke-width="4"/>

  <text x="110" y="150" font-size="34" font-weight="bold" fill="#1E3A63">Học qua chơi,</text>
  <text x="110" y="198" font-size="34" font-weight="bold" fill="#1E3A63">không qua bài tập</text>
  <rect x="112" y="226" width="90" height="7" rx="3.5" fill="#F2C13D"/>
  <text x="110" y="280" font-size="22" fill="#5b6b82">Với trẻ, khối lệnh cũng là</text>
  <text x="110" y="312" font-size="22" fill="#5b6b82">một món đồ chơi lắp ghép.</text>

  <!-- lego-like command blocks being stacked -->
  <g font-size="24" font-weight="bold">
    <path d="M 700 180 h 320 a18 18 0 0 1 18 18 v 40 a18 18 0 0 1 -18 18 h -232 l -14 14 h -46 l -14 -14 h -14 a18 18 0 0 1 -18 -18 v -40 a18 18 0 0 1 18 -18 z" fill="#F2C13D"/>
    <text x="730" y="228" fill="#1E3A63">khi bấm vào nhân vật</text>
    <path d="M 682 268 h 14 l 14 14 h 46 l 14 -14 h 232 a18 18 0 0 1 18 18 v 40 a18 18 0 0 1 -18 18 h -302 a18 18 0 0 1 -18 -18 v -40 a18 18 0 0 1 18 -18 z" fill="#2e86c9"/>
    <text x="730" y="316" fill="#fff">phát âm thanh "meo"</text>
    <!-- loose block being dragged -->
    <path d="M 1150 380 h 250 a18 18 0 0 1 18 18 v 40 a18 18 0 0 1 -18 18 h -250 a18 18 0 0 1 -18 -18 v -40 a18 18 0 0 1 18 -18 z" fill="#1f8b3f" transform="rotate(-8 1275 418)"/>
    <text x="1190" y="432" fill="#fff" transform="rotate(-8 1275 418)">xoay 1 vòng</text>
    <path d="M 1120 360 q -40 40 -90 30" stroke="#b9c8da" stroke-width="4" stroke-dasharray="2 9" fill="none" stroke-linecap="round"/>
  </g>

  <!-- dice + puzzle piece as toys -->
  <g>
    <rect x="700" y="430" width="86" height="86" rx="20" fill="#ffffff" stroke="#e9ecf2" stroke-width="3"/>
    <circle cx="726" cy="456" r="7" fill="#1E3A63"/><circle cx="760" cy="456" r="7" fill="#1E3A63"/>
    <circle cx="726" cy="490" r="7" fill="#1E3A63"/><circle cx="760" cy="490" r="7" fill="#1E3A63"/>
    <path d="M 830 445 h 34 a6 6 0 0 1 6 6 v 12 a14 14 0 1 0 0 26 v 12 a6 6 0 0 1 -6 6 h -74 a6 6 0 0 1 -6 -6 v -74 a6 6 0 0 1 6 -6 h 12 a14 14 0 1 1 28 0 z" fill="#62b4ec"/>
  </g>
  <path d="M 560 480 l 10 24 l 24 10 l -24 10 l -10 24 l -10 -24 l -24 -10 l 24 -10 z" fill="#1f8b3f"/>
</svg>
